name: release-server

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version without v prefix (e.g. 2.8.8). Leave empty for current Cargo.toml."
        required: false
        type: string

permissions:
  contents: write
  packages: write

jobs:
  verify-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      has_dockerfile: ${{ steps.version.outputs.has_dockerfile }}
    steps:
      - uses: actions/checkout@v4
      - id: version
        shell: bash
        run: |
          set -euo pipefail
          INPUT_VERSION="$(jq -r '.inputs.version // empty' "${GITHUB_EVENT_PATH}" 2>/dev/null || true)"
          CARGO_VERSION=$(grep -E '^version = ' Cargo.toml | head -1 | cut -d'"' -f2)
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
            TAG_VERSION="${TAG#v}"
            [[ "${TAG_VERSION}" == "${CARGO_VERSION}" ]] || (echo "Tag/Cargo version mismatch" && exit 1)
          elif [[ -n "${INPUT_VERSION}" ]]; then
            TAG="v${INPUT_VERSION}"
            [[ "${INPUT_VERSION}" == "${CARGO_VERSION}" ]] || (echo "Input/Cargo version mismatch" && exit 1)
          else
            TAG="v${CARGO_VERSION}"
          fi
          echo "version=${CARGO_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          if [[ -f Dockerfile ]]; then
            echo "has_dockerfile=true" >> "${GITHUB_OUTPUT}"
          else
            echo "has_dockerfile=false" >> "${GITHUB_OUTPUT}"
          fi

  publish-crate:
    runs-on: ubuntu-latest
    needs: verify-version
    env:
      CRATES_IO_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # Publish the workspace member `noetl-orchestrate-core` FIRST — noetl-server
      # depends on it (path + version), so `cargo publish` of the root crate needs
      # it resolvable from crates.io (noetl/ai-meta#108; mirrors how noetl-tools
      # publishes noetl-directives, noetl/ai-meta#92).  Idempotent: skip if this
      # version is already published (a re-run, or a release that didn't bump the
      # member — the core moves far less often than the server).
      - name: Publish noetl-orchestrate-core (if changed)
        if: ${{ env.CRATES_IO_TOKEN != '' }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ env.CRATES_IO_TOKEN }}
        run: |
          set -euo pipefail
          VER="$(grep -E '^version = ' orchestrate-core/Cargo.toml | head -1 | cut -d'"' -f2)"
          if cargo search noetl-orchestrate-core 2>/dev/null | grep -q "noetl-orchestrate-core = \"${VER}\""; then
            echo "noetl-orchestrate-core ${VER} already on crates.io; skipping."
          else
            OUTPUT="$(cargo publish -p noetl-orchestrate-core 2>&1)" || {
              echo "$OUTPUT"
              echo "$OUTPUT" | grep -q "already exists" && echo "already published; continuing." || exit 1
            }
            echo "$OUTPUT"
            # Give the sparse index a moment so the root crate's publish resolves it.
            sleep 20
          fi
      # noetl-server is a server BINARY, not a library.  The release
      # artifact is the container image (ghcr.io/noetl/server, published
      # by the publish-image job below); nothing on crates.io depends on
      # noetl-server (verified: 0 reverse dependencies).  The crate also
      # carries git-only dependencies (ehdb-feed / ehdb-l0, added by the
      # EHDB NATS-takeover wiring in v3.55.0), and `cargo publish` rejects
      # a crate whose git deps carry no version ("all dependencies must
      # have a version requirement specified when publishing.  dependency
      # `ehdb-feed` does not specify a version").  So this step could not
      # succeed and we intentionally do NOT publish the noetl-server crate
      # to crates.io.  The noetl-orchestrate-core library above is still
      # published for anyone who wants the pure drive core.
      # See https://github.com/noetl/ai-meta/issues/200.
      - name: Publish noetl-server crate (intentionally skipped — binary, not a library)
        run: echo "noetl-server is a binary; the release artifact is ghcr.io/noetl/server. Not publishing to crates.io (0 reverse deps; git-only ehdb deps forbid cargo publish)."
      - name: Skip publish (no token)
        if: ${{ env.CRATES_IO_TOKEN == '' }}
        run: echo "CRATES_IO_TOKEN is not set; skipping crate publish."

  publish-image:
    runs-on: ubuntu-latest
    needs: verify-version
    if: ${{ needs.verify-version.outputs.has_dockerfile == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/noetl/server:${{ needs.verify-version.outputs.version }}
            ghcr.io/noetl/server:latest

  github-release:
    runs-on: ubuntu-latest
    needs: [verify-version, publish-image]
    if: ${{ always() && needs.verify-version.result == 'success' && (needs.publish-image.result == 'success' || needs.publish-image.result == 'skipped') }}
    steps:
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.verify-version.outputs.tag }}
          generate_release_notes: true
          body: |
            - crate: `noetl-server`
            - image: `ghcr.io/noetl/server:${{ needs.verify-version.outputs.version }}`
